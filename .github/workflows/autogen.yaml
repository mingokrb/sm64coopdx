name: Autogen Lua docs json

on:
  workflow_dispatch:
  push:
    branches: [ android ]

jobs:
    lua-autogen:
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[gen]') }}
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                sudo apt update
                sudo apt install -y python3

            - name: Run autogen
              run: |
                mkdir autogen/converted
                ./autogen/autogen.sh

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: autogen-files
                path: ./autogen/converted/*.json